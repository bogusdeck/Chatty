services:
  - type: web
    name: chatty
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
      - key: AUTH_USERS
        sync: false   # set manually in Render dashboard
